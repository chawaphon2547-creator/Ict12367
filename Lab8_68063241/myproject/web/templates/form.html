<!DOCTYPE html>
<html>
<head>

<title>แบบฟอร์มบันทึกข้อมูล</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background-color: rgba(112,181,255,0.3);
font-family: sans-serif;
}

/* Banner */

.hero img{
width:100%;
height:350px;
object-fit:cover;
}

.hero-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:28px;
font-weight:bold;
text-shadow:2px 2px 8px rgba(0,0,0,0.6);
}

/* Form */

.form-box{
width:420px;
background:white;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
overflow:hidden;
margin:120px auto;
}

.form-header{
background:#6f42c1;
color:white;
text-align:center;
padding:18px;
font-size:22px;
font-weight:bold;
}

.form-body{
padding:25px;
}

.form-control{
border-radius:8px;
}

.btn-success{
width:170px;
margin-right:10px;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand fw-bold" style="color:#b1cd63;">ICT12367</a>

<div>
<a class="btn btn-outline-light me-2" href="{% url 'index' %}">หน้าแรก</a>
<a class="btn btn-outline-light me-2" href="{% url 'form' %}">ลงทะเบียน</a>
<a class="btn btn-outline-light" href="{% url 'about' %}">เกี่ยวกับเรา</a>
</div>

</div>
</nav>

<!-- Banner -->

<div class="container-fluid p-0 hero position-relative">

<img src="https://picsum.photos/1600/400">

<div class="hero-text text-center">
ยินดีต้อนรับสู่เว็บไซต์ของรายวิชา ICT12367
</div>

</div>

<!-- Form -->

<div class="form-box">

<div class="form-header">
แบบฟอร์มบันทึกข้อมูล
</div>

<div class="form-body">

<form>

<div class="mb-3">
<label>ชื่อประชากร</label>
<input type="text" class="form-control">
</div>

<div class="mb-3">
<label>อายุ</label>
<input type="text" class="form-control">
</div>

<button class="btn btn-success">บันทึกการลงทะเบียน</button>
<button type="reset" class="btn btn-danger">ล้างข้อมูล</button>

</form>

</div>
</div>

<footer class="bg-dark text-white text-center p-3 mt-5">
© 2026 ICT12367 SPU | 68063241 ชวภณ รุ่งโรจน์
</footer>

</body>
</html>
